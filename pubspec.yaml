name: solar_hub
description: "Solar Hub - Calculate, Design, and Shop your Solar System!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^17.1.0
  flutter_riverpod: ^3.2.1
  get_storage: ^2.1.1
  get_it: ^9.2.1
  dio: ^5.9.1
  flutter_screenutil: ^5.9.3
  icons_plus: ^5.0.0
  flutter_animate: ^4.5.2
  validatorless: ^1.2.5
  rounded_loading_button_plus: ^3.0.1
  permission_handler: ^12.0.1
  flutter_compass: ^0.8.1
  timeago: ^3.7.1
  path_provider: ^2.1.5
  sqflite_common_ffi: ^2.4.0+2
  barcode_scan2: ^4.7.2
  carousel_slider: ^5.1.2
  geolocator: ^14.0.2
  shimmer: ^3.0.0
  toastification: ^3.0.3
  crystal_navigation_bar: ^1.1.0
  pdf: ^3.11.3
  printing: ^5.14.2
  fl_chart: ^1.1.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^10.12.0
  flutter_spinkit: ^5.2.2
  simple_step_checkout:
    git:
      url: https://github.com/abdulrasol/simple_step_checkout.git
  dartz: ^0.10.1
  equatable: ^2.0.5
  change_package_name: ^1.1.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  cloud_firestore: ^6.2.0
  flutter_local_notifications: ^21.0.0
  riverpod: ^3.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0




flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/png/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
